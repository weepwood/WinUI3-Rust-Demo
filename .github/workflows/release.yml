name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Package version used for a manual artifact build
        required: true
        default: 0.1.0-dev

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        architecture:
          - x64
          - ARM64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME.TrimStart("v")
          } else {
            $version = "${{ inputs.version }}"
          }
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package application
        shell: pwsh
        run: .\scripts\package.ps1 -Architecture "${{ matrix.architecture }}" -Version "${{ steps.version.outputs.value }}"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: system-center-${{ matrix.architecture }}
          path: |
            artifacts/*.zip
            artifacts/*.sha256
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: windows-latest

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          $files = Get-ChildItem .\artifacts -File | Select-Object -ExpandProperty FullName
          gh release create $env:GITHUB_REF_NAME $files --generate-notes --title "WinUI 3 Rust System Center $env:GITHUB_REF_NAME"
