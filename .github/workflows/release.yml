name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - "release/**"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      version:
        description: Package version used for a manual artifact build
        required: true
        default: 0.1.0-dev

permissions:
  contents: write
  statuses: write

concurrency:
  group: release-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

jobs:
  package:
    if: github.event_name != 'pull_request' || startsWith(github.head_ref, 'release/')
    runs-on: windows-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        architecture:
          - x64
          - ARM64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Resolve version
        id: version
        shell: pwsh
        env:
          RELEASE_HEAD: ${{ github.head_ref }}
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME.TrimStart("v")
          } elseif ($env:RELEASE_HEAD -like "release/v*") {
            $version = $env:RELEASE_HEAD.Substring("release/v".Length)
          } elseif ($env:GITHUB_REF_NAME -like "release/v*") {
            $version = $env:GITHUB_REF_NAME.Substring("release/v".Length)
          } else {
            $version = "${{ inputs.version }}"
          }
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package application
        shell: pwsh
        run: .\scripts\package.ps1 -Architecture "${{ matrix.architecture }}" -Version "${{ steps.version.outputs.value }}"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: system-center-${{ matrix.architecture }}
          path: |
            artifacts/*.zip
            artifacts/*.sha256
          if-no-files-found: error

  publish-release:
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      startsWith(github.ref, 'refs/heads/release/') ||
      startsWith(github.head_ref, 'release/')
    needs: package
    runs-on: windows-latest

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_HEAD: ${{ github.head_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          $files = Get-ChildItem .\artifacts -File | Select-Object -ExpandProperty FullName

          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $tag = $env:GITHUB_REF_NAME
            $target = $env:GITHUB_SHA
            $isPrerelease = $false
          } elseif ($env:RELEASE_HEAD -like "release/v*") {
            $tag = $env:RELEASE_HEAD.Substring("release/".Length)
            $target = $env:PR_HEAD_SHA
            $isPrerelease = $true
          } else {
            $tag = $env:GITHUB_REF_NAME.Substring("release/".Length)
            $target = $env:GITHUB_SHA
            $isPrerelease = $true
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $files --clobber
            if ($isPrerelease) {
              gh release edit $tag --prerelease --title "WinUI 3 Rust System Center $tag (Test)"
            }
          } else {
            $arguments = @("release", "create", $tag) + $files + @(
              "--generate-notes",
              "--target", $target,
              "--title", "WinUI 3 Rust System Center $tag"
            )
            if ($isPrerelease) {
              $arguments += "--prerelease"
            }
            gh @arguments
          }

  release-status:
    if: always() && (github.event_name != 'pull_request' || startsWith(github.head_ref, 'release/'))
    needs:
      - package
      - publish-release
    runs-on: ubuntu-latest

    steps:
      - name: Report release status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_RESULT: ${{ needs.package.result }}
          PUBLISH_RESULT: ${{ needs.publish-release.result }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [[ "$PACKAGE_RESULT" == "success" && "$PUBLISH_RESULT" == "success" ]]; then
            state="success"
            description="v0.1.0-beta.1 prerelease published"
          else
            state="failure"
            description="v0.1.0-beta.1 prerelease failed"
          fi

          status_sha="${PR_HEAD_SHA:-$GITHUB_SHA}"
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${status_sha}" \
            -f state="$state" \
            -f context="release/v0.1.0-beta.1" \
            -f description="$description" \
            -f target_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/v0.1.0-beta.1"
