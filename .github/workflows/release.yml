# Prerelease trigger: v0.1.0-beta.4
name: Release

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Package version used for a manual artifact build
        required: true
        default: 0.1.0-dev

permissions:
  contents: write

jobs:
  package:
    if: github.event_name != 'pull_request' || startsWith(github.head_ref, 'release/v')
    runs-on: windows-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        architecture:
          - x64
          - ARM64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Resolve version
        id: version
        shell: pwsh
        env:
          RELEASE_HEAD: ${{ github.head_ref }}
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME.TrimStart("v")
          } elseif ($env:GITHUB_EVENT_NAME -eq "pull_request" -and $env:RELEASE_HEAD -like "release/v*") {
            $version = $env:RELEASE_HEAD.Substring("release/v".Length)
          } else {
            $version = "${{ inputs.version }}"
          }
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package application
        shell: pwsh
        run: .\scripts\package.ps1 -Architecture "${{ matrix.architecture }}" -Version "${{ steps.version.outputs.value }}"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: system-center-${{ matrix.architecture }}
          path: |
            artifacts/*.zip
            artifacts/*.sha256
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'pull_request' && startsWith(github.head_ref, 'release/v'))
    needs: package
    runs-on: windows-latest

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_HEAD: ${{ github.head_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          $files = Get-ChildItem .\artifacts -File | Select-Object -ExpandProperty FullName

          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $tag = $env:GITHUB_REF_NAME
            $target = $env:GITHUB_SHA
            $isPrerelease = $false
          } else {
            $tag = $env:RELEASE_HEAD.Substring("release/".Length)
            $target = $env:PR_HEAD_SHA
            $isPrerelease = $true
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $files --clobber
            if ($isPrerelease) {
              gh release edit $tag --prerelease --title "WinUI 3 Rust System Center $tag (Test)"
            }
          } else {
            $arguments = @("release", "create", $tag) + $files + @(
              "--generate-notes",
              "--target", $target,
              "--title", "WinUI 3 Rust System Center $tag (Test)"
            )
            if ($isPrerelease) {
              $arguments += "--prerelease"
            }
            gh @arguments
          }
