name: Build

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-x64:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add x86_64-pc-windows-msvc

      - name: Format Rust source
        run: cargo fmt --manifest-path .\src\sysbridge\Cargo.toml

      - name: Test Rust bridge
        run: cargo test --manifest-path .\src\sysbridge\Cargo.toml

      - name: Restore
        run: dotnet restore .\src\SystemCenter\SystemCenter.csproj -p:Platform=x64

      - name: Build WinUI application
        run: dotnet build .\src\SystemCenter\SystemCenter.csproj --configuration Release --no-restore -p:Platform=x64
